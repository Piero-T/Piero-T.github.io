<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piero Tavara | Software Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Manrope:wght@600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#059669;--primary-dark:#047857;--primary-light:#a7f3d0;
  --on-primary:#fff;--text:#0f172a;--text-muted:#475569;--text-subtle:#94a3b8;
  --bg:#f8fafc;--surface:#fff;--surface2:#f1f5f9;--surface3:#e2e8f0;
  --border:#e2e8f0;--border2:#cbd5e1;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-lg:0 10px 40px rgba(0,0,0,.08);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;display:inline-block;vertical-align:middle;line-height:1}
.grad{background:linear-gradient(135deg,var(--primary),var(--primary-dark))}
.dot-bg{background-image:radial-gradient(circle at 2px 2px,rgba(5,150,105,.05) 1px,transparent 0);background-size:40px 40px}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}
.fade{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
.fade.in{opacity:1;transform:none}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);transition:box-shadow .3s}
#nav.scrolled{box-shadow:0 2px 20px rgba(0,0,0,.06)}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.nav-logo{font-family:'Manrope',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.03em;color:var(--text)}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;color:var(--text-muted);transition:color .2s}
.nav-links a:hover{color:var(--primary)}
.nav-right{display:flex;align-items:center;gap:12px}
.lang-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:3px;gap:2px}
.lang-btn{padding:4px 12px;border-radius:100px;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:none;cursor:pointer;background:transparent;color:var(--text-muted);transition:all .2s}
.lang-btn.active{background:var(--primary);color:#fff;box-shadow:0 1px 4px rgba(5,150,105,.3)}
.nav-cta{display:flex;align-items:center;gap:6px;padding:9px 20px;border-radius:100px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;color:#fff;border:none;cursor:pointer;transition:transform .2s}
.nav-cta:hover{transform:scale(1.04)}

/* SECTIONS */
section{padding:64px 0}
.container{max-width:1280px;margin:0 auto;padding:0 32px}
.section-label{display:inline-flex;align-items:center;gap:8px;padding:5px 14px;border-radius:100px;background:var(--primary-light);color:#064e3b;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px}
.section-h2{font-family:'Manrope',sans-serif;font-size:clamp(32px,5vw,52px);font-weight:800;letter-spacing:-.03em;line-height:1.05;color:var(--text)}
.section-h2 .accent{color:var(--primary)}
.section-desc{margin-top:16px;color:var(--text-muted);max-width:520px;line-height:1.75;font-size:15px}

/* HERO */
#hero{min-height:100vh;padding-top:64px;display:flex;align-items:center;position:relative;overflow:hidden}
#hero::before{content:'';position:absolute;top:0;right:0;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(5,150,105,.07),transparent 70%);transform:translate(30%,-20%);pointer-events:none}
.hero-grid{display:grid;grid-template-columns:1fr 420px;gap:80px;align-items:center;width:100%;padding:60px 0}
.hero-bg-text{position:absolute;top:50%;left:32px;font-family:'Manrope',sans-serif;font-size:clamp(100px,14vw,180px);font-weight:800;color:rgba(15,23,42,.035);letter-spacing:-.05em;transform:translateY(-50%);pointer-events:none;user-select:none;z-index:0;white-space:nowrap}
.hero-content{position:relative;z-index:1;display:flex;flex-direction:column;gap:28px}
.hero-avail{display:inline-flex;align-items:center;gap:8px;padding:7px 16px;border-radius:100px;background:rgba(5,150,105,.08);border:1px solid rgba(5,150,105,.2);width:fit-content}
.hero-avail-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);animation:pulse 2s infinite}
.hero-avail span{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--primary)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.hero-h1{font-family:'Manrope',sans-serif;font-size:clamp(36px,5vw,64px);font-weight:800;letter-spacing:-.03em;line-height:1.08;color:var(--text)}
.hero-h1 .accent{color:var(--primary)}
.hero-p{font-size:17px;color:var(--text-muted);max-width:520px;line-height:1.8}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:100px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:700;color:#fff;border:none;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(5,150,105,.25)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(5,150,105,.35)}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:100px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:700;color:var(--text);background:#fff;border:1.5px solid var(--border2);cursor:pointer;transition:all .2s}
.btn-secondary:hover{background:var(--surface2)}
.hero-pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding-top:32px;border-top:1px solid var(--border)}
.pillar-label{display:flex;align-items:center;gap:6px;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--primary);margin-bottom:6px}
.pillar-title{font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text);margin-bottom:6px}
.pillar-desc{font-size:12px;color:var(--text-muted);line-height:1.6}
.hero-photo-wrap{position:relative}
.hero-photo{width:100%;aspect-ratio:4/5;border-radius:32px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.12);border:2px solid rgba(255,255,255,.8);position:relative;z-index:1}
.hero-photo img{width:100%;height:100%;object-fit:cover}
.photo-placeholder{width:100%;height:100%;background:linear-gradient(135deg,var(--surface2),var(--surface3));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;border:2px dashed var(--border2)}
.photo-placeholder .material-symbols-outlined{font-size:56px;color:var(--text-subtle)}
.photo-placeholder p{font-size:13px;color:var(--text-muted);text-align:center;line-height:1.5}
.photo-placeholder small{font-size:11px;opacity:.6}
.hero-badge{position:absolute;bottom:-12px;right:32px;z-index:10;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);padding:10px 20px;border-radius:100px;border:1px solid var(--border2);box-shadow:0 8px 30px rgba(0,0,0,.1);display:flex;align-items:center;gap:10px}
.badge-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);position:relative}
.badge-dot::after{content:'';position:absolute;inset:0;border-radius:50%;background:var(--primary);animation:ping 1.5s infinite;opacity:0}
@keyframes ping{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.2);opacity:0}}
.badge-text{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text)}
.hero-deco-tr{position:absolute;top:-24px;right:-24px;width:120px;height:120px;border-top:2px solid rgba(5,150,105,.2);border-right:2px solid rgba(5,150,105,.2);border-radius:0 32px 0 0;z-index:0;transition:transform .5s}
.hero-photo-wrap:hover .hero-deco-tr{transform:translate(6px,-6px)}
.hero-deco-bl{position:absolute;bottom:-24px;left:-24px;width:120px;height:120px;border-bottom:2px solid rgba(5,150,105,.1);border-left:2px solid rgba(5,150,105,.1);border-radius:0 0 0 32px;z-index:0}

/* SERVICES */
#services{background:#fff}
.services-intro{margin-bottom:56px}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.service-card{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:32px;display:flex;flex-direction:column;gap:16px;transition:all .2s}
.service-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.service-icon{width:48px;height:48px;background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);box-shadow:var(--shadow)}
.service-icon .material-symbols-outlined{font-size:24px;color:var(--primary)}
.service-title{font-family:'Manrope',sans-serif;font-size:17px;font-weight:700;color:var(--text)}
.service-desc{font-size:14px;color:var(--text-muted);line-height:1.7;flex:1}
.tag-list{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:4px 10px;background:#fff;border:1px solid var(--border2);border-radius:6px;color:var(--text-muted)}

/* PROJECTS */
#projects{background:var(--bg)}
.projects-header{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:56px;flex-wrap:wrap}
.see-all{display:inline-flex;align-items:center;gap:6px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;color:var(--primary);transition:gap .2s}
.see-all:hover{gap:10px}
.projects-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.proj-featured{grid-column:1/-1;background:#fff;border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:all .2s}
.proj-featured:hover{box-shadow:var(--shadow-lg)}
.proj-img{height:160px;background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.proj-img .material-symbols-outlined{font-size:40px;color:var(--text-subtle)}
.proj-img span.hint{font-size:12px;color:var(--text-muted)}
.proj-body{padding:32px}
.proj-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.proj-chip{padding:4px 12px;border-radius:100px;background:var(--primary-light);color:#064e3b;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600}
.proj-title{font-family:'Manrope',sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-bottom:10px;letter-spacing:-.02em}
.proj-desc{font-size:14px;color:var(--text-muted);line-height:1.7;margin-bottom:20px}
.proj-link{display:inline-flex;align-items:center;gap:6px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;color:var(--primary);transition:gap .2s}
.proj-link:hover{gap:10px}
.proj-small{background:#fff;border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:all .2s;display:flex;flex-direction:column}
.proj-small:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px)}
.proj-small-img{height:120px;background:var(--surface2);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border)}
.proj-small-img .material-symbols-outlined{font-size:32px;color:var(--text-subtle)}
.proj-small-body{padding:24px;flex:1;display:flex;flex-direction:column;gap:10px}
.proj-small-title{font-family:'Manrope',sans-serif;font-size:16px;font-weight:700;color:var(--text)}
.proj-small-desc{font-size:13px;color:var(--text-muted);line-height:1.6;flex:1}
.projects-cta{text-align:center;margin-top:32px}
#projects{padding-bottom:32px}
#skills{padding-top:32px}

/* EXPERIENCE */
#experience{background:#fff}
.exp-timeline{display:flex;flex-direction:column}
.exp-item{display:grid;grid-template-columns:200px 1fr;gap:0 48px;padding:36px 0;border-bottom:1px solid var(--border)}
.exp-item:first-child{border-top:1px solid var(--border)}
.exp-meta{padding-top:4px}
.exp-date{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;line-height:1.6}
.exp-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
/* old grid kept for responsive override */
.exp-grid{display:grid;grid-template-columns:5fr 7fr;gap:20px}
.exp-card{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:32px;display:flex;flex-direction:column;justify-content:space-between;gap:24px;transition:box-shadow .2s}
.exp-card:hover{box-shadow:var(--shadow-lg)}
.exp-card.white{background:#fff}
.exp-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px}
.exp-icon{width:48px;height:48px;background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);box-shadow:var(--shadow)}
.exp-icon .material-symbols-outlined{font-size:24px;color:var(--primary)}
.exp-icon.grad-icon{background:linear-gradient(135deg,var(--primary),var(--primary-dark))}
.exp-icon.grad-icon .material-symbols-outlined{color:#fff}
.exp-badge{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:100px}
.exp-badge.active{background:rgba(5,150,105,.1);color:var(--primary);border:1px solid rgba(5,150,105,.2)}
.exp-badge.done{background:var(--surface3);color:var(--text-muted);border:1px solid var(--border2)}
.exp-co{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px}
.exp-role{font-family:'Manrope',sans-serif;font-size:20px;font-weight:800;color:var(--text);margin-bottom:12px;letter-spacing:-.02em}
.exp-desc{font-size:14px;color:var(--text-muted);line-height:1.7}
.exp-bullets{list-style:none;display:flex;flex-direction:column;gap:10px}
.exp-bullets li{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text-muted);line-height:1.6}
.exp-bullets li .material-symbols-outlined{font-size:16px;color:var(--primary);flex-shrink:0;margin-top:2px}
.exp-stat-big{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;color:var(--primary);line-height:1}
.exp-stat-lbl{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
.exp-bottom{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border);padding-top:20px;text-align:center}
.exp-bottom-val{font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;color:var(--text)}
.exp-bottom-lbl{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-top:2px}
.exp-row{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.exp-small{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:28px;display:flex;flex-direction:column;gap:14px;transition:box-shadow .2s}
.exp-small:hover{box-shadow:var(--shadow-lg)}
.exp-small-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.exp-small-info{display:flex;align-items:center;gap:12px}
.exp-small-icon{width:40px;height:40px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
.exp-small-icon .material-symbols-outlined{font-size:20px;color:var(--primary)}
.exp-small-co{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted)}
.exp-small-role{font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;color:var(--text)}

/* SKILLS */
#skills{background:var(--bg)}
.skills-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.skills-card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:32px}
.skills-card-head{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.skills-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.skills-icon.green{background:rgba(5,150,105,.1)}
.skills-icon.green .material-symbols-outlined{color:var(--primary)}
.skills-icon.slate{background:rgba(71,85,105,.1)}
.skills-icon.slate .material-symbols-outlined{color:var(--text-muted)}
.skills-card-title{font-family:'Manrope',sans-serif;font-size:17px;font-weight:700;color:var(--text)}
.skill-chips{display:flex;flex-wrap:wrap;gap:10px}
.skill-chip{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:8px 16px;font-size:13px;font-weight:600;color:var(--text);transition:border-color .2s;cursor:default}
.skill-chip:hover{border-color:var(--primary)}
.soft-list{list-style:none;display:flex;flex-direction:column;gap:12px}
.soft-list li{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text-muted)}
.soft-list .material-symbols-outlined{font-size:16px;color:var(--primary)}
.skills-full{grid-column:1/-1}
.skills-auto{border-radius:20px;padding:32px;color:#fff;position:relative;overflow:hidden}
.skills-auto-inner{position:relative;z-index:1;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:24px}
.auto-chips{display:flex;flex-wrap:wrap;gap:10px}
.auto-chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);padding:8px 18px;border-radius:12px;font-size:13px;font-weight:600}
.skills-auto-bg{position:absolute;right:-20px;bottom:-20px;font-size:180px;opacity:.06;pointer-events:none}
.skills-edu{background:#fff;border:1px solid var(--border);border-radius:20px;padding:32px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.edu-left{display:flex;align-items:center;gap:20px}
.edu-icon{width:56px;height:56px;background:rgba(5,150,105,.1);border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.edu-icon .material-symbols-outlined{font-size:28px;color:var(--primary)}
.edu-label{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--primary);margin-bottom:4px}
.edu-title{font-family:'Manrope',sans-serif;font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.02em}
.edu-sub{font-size:13px;color:var(--text-muted);margin-top:2px}
.edu-year{font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:700;color:var(--border2);line-height:1}
.edu-year-lbl{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);text-align:right}

/* ABOUT */
#about{background:#fff}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.about-text{display:flex;flex-direction:column;gap:20px}
.about-p{font-size:15px;color:var(--text-muted);line-height:1.85}
.about-btns{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.about-photo{position:relative}
.about-photo-inner{aspect-ratio:1;border-radius:28px;overflow:hidden;border:1px solid var(--border);min-height:380px}
.about-photo-inner #about-map{width:100%;height:100%;min-height:380px}
.district-label{background:rgba(255,255,255,.92)!important;border:1px solid rgba(5,150,105,.3)!important;box-shadow:0 2px 8px rgba(0,0,0,.1)!important;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#047857;white-space:nowrap;padding:4px 8px!important;border-radius:6px!important}
.district-label::before{display:none!important}

/* CONTACT */
#contact{background:var(--bg)}
.contact-solo{max-width:720px;margin:0 auto}
.contact-solo-head{text-align:center;margin-bottom:36px}
.contact-heading{font-family:'Manrope',sans-serif;font-size:clamp(32px,4vw,50px);font-weight:800;letter-spacing:-.04em;line-height:1.05;color:var(--text);margin-bottom:16px}
.contact-heading .accent{color:var(--primary)}

        {id:'arch-2d-3d',title:'Prototipo de Reconstrucci\u00f3n Arquitect\u00f3nica 2D a 3D',type:'Prototipo de Investigaci\u00f3n',year:'2026',icon:'architecture',desc:'Prototipo que convierte planos arquitect\u00f3nicos 2D en modelos 3D usando visi\u00f3n por computador y estimaci\u00f3n de profundidad. Desarrollado para investigaci\u00f3n de tesis en curso.',tags:['Python','Computer Vision','Open3D'],stack:['Python','OpenCV','Open3D','NumPy','Matplotlib'],cols:8,images:['images/Architectural 2D-to-3D/wallsup0.JPG','images/Architectural 2D-to-3D/wallsup1.JPG','images/Architectural 2D-to-3D/wallsup 3.png','images/Architectural 2D-to-3D/walssup4.png'],detail:{summary:'Prototipo de investigaci\u00f3n que explora la conversi\u00f3n autom\u00e1tica de planos arquitect\u00f3nicos 2D en representaciones tridimensionales usando t\u00e9cnicas de visi\u00f3n por computador.',problem:'Los arquitectos destinan horas a la modelaci\u00f3n 3D manual a partir de planos existentes. El proceso es costoso, lento y propenso a errores de interpretaci\u00f3n entre equipos t\u00e9cnicos.',objective:'Demostrar la viabilidad t\u00e9cnica de automatizar la conversi\u00f3n de planos 2D en modelos 3D navegables, estableciendo una base s\u00f3lida para investigaci\u00f3n posterior.',role:'Dise\u00f1\u00e9 la arquitectura del sistema, implement\u00e9 los algoritmos de detecci\u00f3n y segmentaci\u00f3n, y desarroll\u00e9 el pipeline de conversi\u00f3n 3D completo.',technical:'OpenCV detecta y segmenta elementos arquitect\u00f3nicos (paredes, puertas, ventanas) mediante detecci\u00f3n de contornos. Reglas heur\u00edsticas extruyen los elementos en el eje Z. Open3D genera la malla 3D exportable.',challenges:'La variabilidad en estilos de planos - diferentes convenciones gr\u00e1ficas, escalas y calidades de escaneo - requiri\u00f3 pipelines de preprocesamiento adaptativos para normalizar la entrada.',outcome:'Prototipo funcional que convierte planos simples en 15-30 segundos con una tasa de detecci\u00f3n del 78%. Validado con 12 planos de referencia. Investigaci\u00f3n en curso, a\u00fan no presentada formalmente.',lessons:'La robustez ante variaciones de entrada es el mayor reto en visi\u00f3n por computador aplicada. Los datos de dominio espec\u00edfico son cr\u00edticos. Los prototipos tempranos validan hip\u00f3tesis antes de invertir en modelos complejos.',screenshotCount:3}},
        {id:'gov-procurement',title:'An\u00e1lisis de Inteligencia en Contrataci\u00f3n P\u00fablica',type:'Sistema de Inteligencia',year:'2026',icon:'policy',desc:'Sistema de inteligencia end-to-end que extrae, consolida, filtra y categoriza con IA oportunidades de contrataci\u00f3n p\u00fablica de decenas de entidades gubernamentales peruanas.',tags:['Python','OpenAI API','BeautifulSoup'],stack:['Python','requests','BeautifulSoup','pandas','openpyxl','OpenAI API','Data Analysis'],cols:4,thumbnail:'images/Government Procurement Intelligence Analysis/preview.JPG',images:['images/Government Procurement Intelligence Analysis/pac_dashboard_portfolio.html'],detail:{summary:'Sistema de inteligencia de compras que extrae, consolida, filtra y categoriza con IA las oportunidades de contrataci\u00f3n p\u00fablica de decenas de entidades gubernamentales peruanas. Entregué un panel de inteligencia priorizado, diseñado para adaptarse al flujo de trabajo del equipo de consultoría.',problem:'El equipo de consultor\u00eda revisaba manualmente los portales de contrataci\u00f3n p\u00fablica diariamente, un flujo lento y propenso a errores que dificultaba la priorizaci\u00f3n y aumentaba el riesgo de perder plazos. El creciente volumen de registros en m\u00faltiples entidades hac\u00eda el an\u00e1lisis sistem\u00e1tico cada vez m\u00e1s impracticable.',objective:'Automatizar el pipeline completo desde la extracci\u00f3n de contrataciones hasta la priorizaci\u00f3n de oportunidades, reduciendo el esfuerzo manual y mejorando la identificaci\u00f3n de oportunidades estrat\u00e9gicamente relevantes mediante an\u00e1lisis de datos y categorizaci\u00f3n asistida por IA.',role:'Desarrollador y consultor \u00fanico responsable de la arquitectura del sistema, flujos de extracci\u00f3n, l\u00f3gica de clasificaci\u00f3n con IA, generaci\u00f3n de reportes, comunicaci\u00f3n con el cliente y validaci\u00f3n iterativa basada en sesiones de feedback. Tambi\u00e9n gestion\u00e9 la propuesta del proyecto, negociaci\u00f3n de precios y coordinaci\u00f3n de entrega.',technical:'Desarroll\u00e9 un scraper con sesi\u00f3n usando Python, requests y BeautifulSoup para extraer datos PAC de portales gubernamentales. Implement\u00e9 scoring por palabras clave, matching difuso de entidades, categorizaci\u00f3n con GPT-4o mini y pipelines de reportes con openpyxl. El entregable final inclu\u00eda oportunidades categorizadas, indicadores de urgencia y dashboards resumen.',challenges:'El principal reto t\u00e9cnico fue manejar portales JSF con estado, donde solicitudes intermedias ocultas eran necesarias para inicializar sesiones de entidad antes de que las descargas estuvieran disponibles. La normalizaci\u00f3n de nombres de entidades inconsistentes entre datasets requiri\u00f3 estrategias de matching difuso y reglas de validaci\u00f3n manual.',outcome:'Entregué un panel de inteligencia validado que permiti\u00f3 al equipo identificar oportunidades de alta prioridad de forma m\u00e1s eficiente y respald\u00f3 la continuaci\u00f3n del proyecto en una segunda fase enfocada en monitoreo.',lessons:'Este proyecto reforz\u00f3 la importancia de estrategias de scraping conscientes de la sesi\u00f3n, normalizaci\u00f3n robusta de datos, y combinar filtrado por reglas con categorizaci\u00f3n asistida por IA para reducir falsos positivos en grandes datasets.',screenshotCount:3}},
        {id:'recruitment-ngr',title:'Autocaller Android',type:'Aplicación Android',year:'2026',icon:'phone_in_talk',portrait:true,desc:'Prototipo funcional de aplicativo Android para optimizar reclutamiento masivo mediante marcación automatizada y gestión de contactos desde bases de datos locales.',tags:['Kotlin','Android','Automatización'],stack:['Kotlin','Android SDK','Material Design 3','SharedPreferences'],cols:4,images:['images/simple caller app/Screenshot_20260508_122634.png'],detail:{summary:'Prototipo funcional de un aplicativo Android desarrollado para optimizar flujos de reclutamiento masivo mediante marcación automatizada y gestión de contactos desde bases de datos locales.',problem:'En campañas masivas, los reclutadores pierden entre 2 y 3 horas diarias marcando números manualmente y transcribiendo notas. El proceso es agotador, propenso a errores de digitación y dificulta el seguimiento de indicadores en tiempo real.',objective:'Automatizar la logística de llamadas para maximizar la capacidad de contacto diario y centralizar la recolección de datos en una interfaz móvil eficiente.',role:'Identifiqué el cuello de botella operativo, diseñé la interfaz de usuario y desarrollé la lógica completa del aplicativo, liderando además la implementación del piloto con el equipo de reclutamiento.',technical:'Kotlin y Android SDK. Implementación de ACTION_CALL para marcación directa y retorno automático a la app. Motor de procesamiento de CSV para lectura de bases de datos de contactos y persistencia local de notas mediante SharedPreferences.',challenges:'La variabilidad en el formato de los archivos de origen, con distintos delimitadores y codificación de caracteres como Ñ o tildes, requirió desarrollar un parser robusto y funciones de limpieza de datos para normalizar la entrada.',outcome:'Incremento del 125% en productividad individual, pasando de un promedio de 80 a 180 llamadas por turno. Se alcanzó un pico récord de 45 entrevistas agendadas en un solo día. Actualmente en fase piloto para equipos internos y externos.',lessons:'La optimización de micro-interacciones, ahorrando 10 segundos por llamada, genera un impacto masivo en tareas de alto volumen. Una solución 100% local elimina barreras de adopción corporativa relacionadas con privacidad de datos.',screenshotCount:1}},
        {id:'habit-tracker',title:'App de Gesti\u00f3n de H\u00e1bitos',type:'Aplicaci\u00f3n M\u00f3vil',year:'2025',icon:'check_circle',portrait:true,desc:'App m\u00f3vil con CRUD completo, sistema de pasos configurables, edici\u00f3n en l\u00ednea e importaci\u00f3n y exportaci\u00f3n de rutinas en formato JSON.',tags:['React Native','Node.js','SQLite'],stack:['React Native','Node.js','SQLite','Expo','AsyncStorage'],cols:4,images:['images/habits app/app1.png','images/habits app/Screenshot_20260507_160213.png','images/habits app/Screenshot_20260507_160612.png'],detail:{summary:'Aplicaci\u00f3n m\u00f3vil para el seguimiento de h\u00e1bitos diarios con sistema de pasos configurables, visualizaci\u00f3n de progreso e importaci\u00f3n y exportaci\u00f3n de rutinas.',problem:'Las apps de h\u00e1bitos existentes son demasiado simples o sobrecargadas. Los usuarios necesitan configurar h\u00e1bitos multi-paso con la menor fricci\u00f3n posible.',objective:'Crear una aplicaci\u00f3n m\u00f3vil intuitiva que permita definir h\u00e1bitos con pasos, hacer seguimiento diario del progreso y compartir rutinas mediante exportaci\u00f3n de datos.',role:'Dise\u00f1\u00e9 la arquitectura, implement\u00e9 el frontend con React Native, la persistencia con SQLite y las funcionalidades de importaci\u00f3n y exportaci\u00f3n en JSON.',technical:'React Native con Expo para compatibilidad iOS/Android. Persistencia local con Expo SQLite. Sistema de pasos con estructura jer\u00e1rquica. Importaci\u00f3n/exportaci\u00f3n JSON v\u00eda sistema de archivos.',challenges:'La sincronizaci\u00f3n del estado de la UI con los cambios en la base de datos local present\u00f3 retos de consistencia, especialmente en el modo de edici\u00f3n en l\u00ednea.',outcome:'Aplicaci\u00f3n funcional con m\u00e1s de 15 funcionalidades implementadas. Flujo de usuario validado con pruebas reales. Exportaci\u00f3n e importaci\u00f3n funcionando en ambas plataformas.',lessons:'El dise\u00f1o del modelo de datos es crucial antes de escribir UI. Las pruebas con usuarios reales tempranas evitan redise\u00f1os costosos.',screenshotCount:4}},
        {id:'ai-social-skills',title:'IA para Habilidades Sociales - Tesis',type:'Proyecto de Tesis',year:'2025',icon:'psychology',images:['images/tesis/maqueta.png','images/tesis/arquitectura.JPG'],portrait:true,desc:'Sistema de IA con visi\u00f3n por computador para reconocimiento de expresiones faciales y NLP para comunicaci\u00f3n. Orientado a ni\u00f1os con TEA.',tags:['Computer Vision','NLP','Python'],stack:['Python','TensorFlow','OpenCV','NLTK','Flask'],cols:4,detail:{summary:'Propuesta de tesis que dise\u00f1a un sistema de IA para asistir el desarrollo de habilidades sociales en ni\u00f1os con TEA, combinando reconocimiento de expresiones faciales y NLP.',problem:'Los ni\u00f1os con TEA presentan dificultades para reconocer expresiones emocionales y mantener conversaciones socialmente apropiadas. Las terapias convencionales tienen alcance limitado y alto costo.',objective:'Dise\u00f1ar un sistema de IA que sirva como herramienta de apoyo terap\u00e9utico, con feedback en tiempo real sobre reconocimiento emocional y comunicaci\u00f3n para ni\u00f1os con TEA.',role:'Desarroll\u00e9 el proyecto en dupla. Junto a mi compa\u00f1ero redactamos la propuesta de investigaci\u00f3n, dise\u00f1amos la arquitectura del sistema, revisamos 47 art\u00edculos de literatura relacionada y elaboramos el plan metodol\u00f3gico.',technical:'M\u00f3dulo de visi\u00f3n con OpenCV y TensorFlow para detecci\u00f3n y clasificaci\u00f3n de expresiones faciales en tiempo real. M\u00f3dulo NLP con NLTK para an\u00e1lisis de patrones de comunicaci\u00f3n. Interfaz web Flask.',challenges:'Obtener datos de entrenamiento \u00e9ticos y representativos de poblaci\u00f3n con TEA. La evaluaci\u00f3n de impacto cl\u00ednico requiere coordinaci\u00f3n con instituciones y aprobaci\u00f3n de comit\u00e9s de \u00e9tica.',outcome:'Propuesta aprobada. Revisi\u00f3n sistem\u00e1tica completada con 47 art\u00edculos analizados. Prototipo conceptual documentado y arquitectura t\u00e9cnica validada por asesores acad\u00e9micos.',lessons:'La investigaci\u00f3n interdisciplinaria requiere colaboraci\u00f3n con expertos cl\u00ednicos. Las consideraciones \u00e9ticas en IA para poblaciones vulnerables deben ser centrales desde el dise\u00f1o.',screenshotCount:2}}

      additional:[
        {id:'autism-lit-review',title:'Revisión Sistemática sobre Terapias para Autismo Asistidas por Tecnología',type:'Revisión Académica',year:'2025',icon:'menu_book',thumbnail:'images/autism lit review/preview.JPG',thumbPosition:'top',images:[],desc:'Estudio comparativo que analiza intervenciones asistidas por tecnología frente a enfoques terapéuticos tradicionales para el desarrollo de habilidades sociales en personas con trastorno del espectro autista.',tags:['Investigación','Análisis Comparativo','TEA'],stack:['Academic Research','Literature Review','Comparative Analysis','Data Synthesis','Autism Technology Research'],cols:6,detail:{summary:'Estudio de investigación comparativa que analiza intervenciones asistidas por tecnología frente a enfoques terapéuticos tradicionales para el desarrollo de habilidades sociales y emocionales en personas con trastorno del espectro autista.',problem:'Las terapias para el autismo asistidas por tecnología han crecido rápidamente en los últimos años, incluyendo intervenciones basadas en realidad virtual, realidad aumentada, robótica y sistemas asistidos por IA. Sin embargo, comprender cómo estos enfoques se comparan con los métodos terapéuticos tradicionales sigue siendo un desafío de investigación significativo.',objective:'Realizar una revisión sistemática de literatura para identificar, clasificar y comparar intervenciones terapéuticas asistidas por tecnología frente a enfoques tradicionales en el desarrollo de habilidades sociales relacionadas con el autismo.',role:'Responsable de la planificación de la investigación, selección de estudios, clasificación de artículos, análisis comparativo, síntesis de hallazgos, y documentación de limitaciones, sesgos y desafíos de implementación en los estudios revisados.',technical:'La revisión analizó estudios académicos sobre intervenciones para el autismo asistidas por tecnología, incluyendo enfoques basados en realidad aumentada, realidad virtual, robótica, sistemas asistidos por IA y tecnologías educativas interactivas. El análisis comparó resultados terapéuticos, desafíos de implementación, adaptabilidad, accesibilidad y limitaciones reportadas en los estudios.',challenges:'Las limitaciones más comunes identificadas en los estudios revisados incluyeron muestras pequeñas de participantes, falta de validación a largo plazo, desafíos de accesibilidad, limitaciones de infraestructura, formación profesional insuficiente, y dificultades para generalizar resultados en contextos diversos.',outcome:'La revisión proporcionó una comprensión estructurada de las tendencias actuales, limitaciones y oportunidades en terapias para el autismo asistidas por tecnología, apoyando también la base conceptual para futuros sistemas educativos asistidos por IA.',lessons:'El proyecto reforzó la importancia del análisis basado en evidencia al diseñar intervenciones tecnológicas centradas en el ser humano, especialmente en dominios sensibles como el apoyo al autismo y el desarrollo de habilidades sociales.',screenshotCount:0,keyFindings:[{stat:'83.5%',label:'Precisión de reconocimiento facial'},{stat:'86%',label:'Mejora en interacción social'},{stat:'AR + Robótica',label:'Mayor potencial de compromiso'}],comparisonMatrix:{headerAspect:'Aspecto',headerTrad:'Terapias Tradicionales',headerTech:'Terapias Asistidas por Tecnología',rows:[['Interacción','Dependiente del terapeuta','Más interactividad y retroalimentación inmediata'],['Personalización','Adaptación manual','Potencial de adaptación dinámica y personalizada'],['Accesibilidad','Limitada por ubicación y disponibilidad','Posibilidad de acceso remoto o digital'],['Engagement','Puede variar según el entorno','Mayor estímulo visual e interacción'],['Escalabilidad','Difícil de escalar','Potencial para llegar a más usuarios'],['Validación','Métodos más consolidados','Aún requiere más estudios a largo plazo'],['Infraestructura','Menor dependencia tecnológica','Requiere conectividad y recursos tecnológicos'],['Capacitación','Basada en experiencia clínica','Requiere formación técnica adicional']]}}},
        {id:'windows-macro',title:'Automatizador de Macros - Desktop',type:'Herramienta de Escritorio',year:'2025',icon:'terminal',desc:'Herramienta de escritorio para grabar y reproducir macros de teclado y mouse, con interfaz gráfica moderna. Automatiza tareas repetitivas en cualquier aplicación sin depender de software externo.',tags:['Python','pynput','tkinter'],stack:['Python','pynput','tkinter','JSON'],cols:3,images:['images/windows macro/macro.JPG'],detail:{summary:'Herramienta de escritorio para grabar y reproducir macros de teclado y mouse, con interfaz gráfica moderna. Permite automatizar tareas repetitivas en cualquier aplicación sin depender de software externo.',problem:'Muchas tareas de productividad implican repetir la misma secuencia de clics y teclas decenas de veces. Las soluciones existentes son pesadas, de pago o requieren configuración compleja.',objective:'Crear una herramienta ligera, portable y de uso inmediato que grabe interacciones reales y las reproduzca con precisión, incluyendo tiempos entre acciones.',role:'Diseñé e implementé el proyecto completo: lógica de grabación y reproducción, manejo de hilos para no bloquear la interfaz, y la GUI con tema oscuro.',technical:'pynput captura eventos globales de teclado y mouse en tiempo real. Los eventos se serializan en JSON con timestamps relativos para reproducción proporcional. Un sanitizador normaliza teclas de control (Ctrl+C, Ctrl+V, etc.) que pynput representa como caracteres de escape. La GUI está construida con tkinter y corre la lógica en hilos separados para mantener la interfaz responsiva.',challenges:'El principal reto fue el manejo de teclas especiales: combinaciones como Ctrl+W se registran como caracteres de escape y necesitaban normalizarse antes de reproducirse. También fue necesario separar la lógica de input del hilo principal para evitar que la GUI se congelara durante la grabación.',outcome:'Herramienta funcional de uso diario para automatizar flujos repetitivos. Portable, sin instaladores, ejecutable directamente con Python.',lessons:'Los listeners globales de input requieren aislamiento cuidadoso en hilos separados. La sincronización entre la GUI y procesos en background es tan importante como la lógica principal. La simplicidad técnica bien ejecutada resuelve problemas reales sin over-engineering.',screenshotCount:1}},
        {id:'excel-recruitment',title:'Sesiones de Capacitaci\u00f3n Excel - RRHH',type:'Capacitaci\u00f3n',year:'2025',icon:'table_chart',desc:'Programa de capacitaci\u00f3n en Excel para equipos de RRHH, orientado a construir reportes con indicadores clave que den visibilidad real a la jefatura para tomar decisiones.',tags:['Excel','Power Query','RRHH'],stack:['Microsoft Excel','Power Query','VBA','Power BI'],cols:3,images:['images/clases excel/dashboard.svg'],detail:{summary:'Dise\u00f1\u00e9 y dict\u00e9 un programa de capacitaci\u00f3n en Excel orientado a que los equipos de RRHH pudieran transformar datos operativos en reportes con indicadores clave de gesti\u00f3n (rotaci\u00f3n, ausentismo, desempe\u00f1o) que dieran a la jefatura visibilidad real sobre el \u00e1rea y una base concreta para tomar decisiones.',problem:'Las jefaturas de RRHH recib\u00edan reportes b\u00e1sicos que no cubr\u00edan los indicadores clave del \u00e1rea ni facilitaban la toma de decisiones. Los equipos ten\u00edan los datos, pero no las herramientas para convertirlos en informaci\u00f3n accionable.',objective:'Capacitar a los equipos de RRHH para construir reportes que cubran indicadores clave de gesti\u00f3n y generen insights claros que apoyen las decisiones estrat\u00e9gicas de la jefatura.',role:'Dise\u00f1\u00e9 el curr\u00edculum, elabor\u00e9 materiales y ejercicios pr\u00e1cticos con casos reales, impart\u00ed las sesiones y realic\u00e9 seguimiento de adopci\u00f3n.',technical:'Programa de 4 sesiones: (1) Funciones avanzadas (VLOOKUP, INDEX-MATCH, XLOOKUP); (2) Tablas din\u00e1micas; (3) Power Query para transformaci\u00f3n de datos; (4) Macros VBA b\u00e1sicas.',challenges:'Los distintos niveles previos en el equipo requirieron adaptar el ritmo. Mantener inter\u00e9s en sesiones t\u00e9cnicas requiri\u00f3 usar casos reales del trabajo cotidiano como ejemplos.',outcome:'Los equipos lograron construir reportes peri\u00f3dicos con indicadores clave que antes no exist\u00edan, d\u00e1ndole a la jefatura visibilidad real sobre el \u00e1rea. La informaci\u00f3n presentada pas\u00f3 de ser un listado de datos a un insumo concreto para decisiones, y el tiempo de preparaci\u00f3n de reportes se redujo significativamente.',lessons:'La capacitaci\u00f3n es m\u00e1s efectiva con datos reales del participante. El seguimiento post-capacitaci\u00f3n es clave para la adopci\u00f3n. Dar recursos de referencia supera al tutorial paso a paso.',screenshotCount:1}}

      viewAll:'See all projects',
      featured:[
        {id:'arch-2d-3d',title:'Architectural 2D-to-3D Reconstruction Prototype',type:'Research Prototype',year:'2026',icon:'architecture',desc:'Prototype that converts 2D architectural floor plans into 3D models using computer vision and depth estimation techniques.',tags:['Python','Computer Vision','Open3D'],stack:['Python','OpenCV','Open3D','NumPy','Matplotlib'],cols:8,images:['images/Architectural 2D-to-3D/wallsup0.JPG','images/Architectural 2D-to-3D/wallsup1.JPG','images/Architectural 2D-to-3D/wallsup 3.png','images/Architectural 2D-to-3D/walssup4.png'],detail:{summary:'Research prototype that explores the automatic conversion of 2D architectural floor plans into three-dimensional representations using computer vision and image processing techniques.',problem:'Architects spend significant hours on manual 3D modeling from existing plans. The process is costly, slow and prone to interpretation errors between technical teams.',objective:'Demonstrate the technical feasibility of automating the conversion of 2D plans into navigable 3D models, establishing a solid foundation for further research.',role:'Designed the system architecture, implemented detection and segmentation algorithms, and developed the complete 3D conversion pipeline.',technical:'OpenCV detects and segments architectural elements (walls, doors, windows) via contour detection. Heuristic rules extrude elements on the Z axis. Open3D generates the exportable 3D mesh.',challenges:'Variability in floor plan styles - different graphic conventions, scales and scan qualities - required adaptive preprocessing pipelines to normalize input.',outcome:'Functional prototype converting simple plans in 15-30 seconds with a 78% element detection rate. Validated with 12 reference plans. Research is ongoing and has not been formally submitted yet.',lessons:'Robustness to input variations is the biggest challenge in applied computer vision. Domain-specific data is critical. Early prototypes validate hypotheses before investing in complex models.',screenshotCount:3}},
        {id:'gov-procurement',title:'Government Procurement Intelligence Analysis',type:'Intelligence System',year:'2026',icon:'policy',desc:'End-to-end procurement intelligence system that scraped, consolidated, AI-categorized and prioritized public procurement opportunities from dozens of Peruvian government entities.',tags:['Python','OpenAI API','BeautifulSoup'],stack:['Python','requests','BeautifulSoup','pandas','openpyxl','OpenAI API','Data Analysis'],cols:4,thumbnail:'images/Government Procurement Intelligence Analysis/preview.JPG',images:['images/Government Procurement Intelligence Analysis/pac_dashboard_portfolio.html'],detail:{summary:'Built an end-to-end procurement intelligence system that scraped, consolidated, filtered, and AI-categorized public procurement opportunities from dozens of Peruvian government entities. Delivered a prioritized intelligence panel tailored to fit directly into the operational workflow of the consulting team.',problem:'The consulting team manually reviewed public procurement portals daily to identify relevant opportunities - a slow and error-prone workflow that made prioritization difficult and increased the risk of missed deadlines. The growing volume of procurement records across multiple entities made systematic analysis increasingly impractical.',objective:'Automate the full pipeline from procurement extraction to opportunity prioritization, reducing manual effort and improving the identification of strategically relevant opportunities through data analysis and AI-assisted categorization.',role:'Sole developer and consultant responsible for system architecture, data extraction workflows, AI-assisted classification logic, report generation, client communication, and iterative validation based on operational feedback sessions. Also handled project proposal preparation, pricing discussions, and delivery coordination.',technical:'Developed a session-based procurement scraper using Python, requests, and BeautifulSoup to extract PAC data from government procurement portals. Implemented keyword scoring, fuzzy entity matching, AI-assisted categorization using GPT-4o mini, and structured reporting pipelines using openpyxl. The final deliverable included categorized opportunities, urgency indicators, and summary dashboards for operational decision-making.',challenges:'One of the main technical challenges involved handling stateful JSF procurement portals, where hidden intermediate requests were required to properly initialize server-side entity sessions before file downloads became available. Additional complexity came from normalizing inconsistent entity names across multiple datasets, requiring custom fuzzy matching strategies and manual validation rules.',outcome:'Delivered a validated procurement intelligence panel that allowed the consulting team to identify high-priority opportunities more efficiently and supported the continuation of the project into a second monitoring-focused phase.',lessons:'This project reinforced the importance of session-aware scraping strategies, robust data normalization, and combining rule-based filtering with AI-assisted categorization to reduce false positives in large procurement datasets.',screenshotCount:3}},
        {id:'recruitment-ngr',title:'Android Autocaller',type:'Android App',year:'2026',icon:'phone_in_talk',portrait:true,desc:'Functional Android prototype to optimize mass recruitment through automated dialing and contact management from local databases.',tags:['Kotlin','Android','Automation'],stack:['Kotlin','Android SDK','Material Design 3','SharedPreferences'],cols:4,images:['images/simple caller app/Screenshot_20260508_122634.png'],detail:{summary:'Functional Android prototype developed to optimize mass recruitment workflows through automated dialing and contact management from local databases.',problem:'In high-volume campaigns, recruiters lose 2 to 3 hours daily dialing numbers manually and transcribing notes. The process is exhausting, error-prone and makes real-time indicator tracking difficult.',objective:'Automate call logistics to maximize daily contact capacity and centralize data collection in an efficient mobile interface.',role:'Identified the operational bottleneck, designed the user interface and developed the full application logic, leading the pilot rollout with the recruitment team.',technical:'Kotlin and Android SDK. ACTION_CALL implementation for direct dialing and automatic return to the app. CSV processing engine for reading contact databases and local note persistence via SharedPreferences.',challenges:'File format variability in source files, including different delimiters and character encoding issues with special characters, required building a robust parser and data-cleaning functions to normalize input.',outcome:'125% increase in individual productivity, going from an average of 80 to 180 calls per shift. A record peak of 45 interviews scheduled in a single day was reached. Currently in pilot phase for internal and external teams.',lessons:'Optimizing micro-interactions, saving 10 seconds per call, generates massive impact in high-volume tasks. A 100% local solution removes corporate adoption barriers related to data privacy.',screenshotCount:1}},
        {id:'habit-tracker',title:'Habit Tracking Mobile App',type:'Mobile App',year:'2025',icon:'check_circle',portrait:true,desc:'Mobile app with full CRUD, configurable steps system, inline editing and routine import/export in JSON format.',tags:['React Native','Node.js','SQLite'],stack:['React Native','Node.js','SQLite','Expo','AsyncStorage'],cols:4,images:['images/habits app/app1.png','images/habits app/Screenshot_20260507_160213.png','images/habits app/Screenshot_20260507_160612.png'],detail:{summary:'Mobile app for daily habit tracking with a configurable steps system, progress visualization and routine import/export functionality.',problem:'Existing habit apps are either too simple or feature-bloated. Users need a flexible solution to configure multi-step habits with minimal friction.',objective:'Create an intuitive mobile app allowing users to define step-based habits, track daily progress and share routines via data export.',role:'Designed the architecture, implemented the React Native frontend, SQLite persistence and import/export functionality in JSON format.',technical:'React Native with Expo for iOS/Android compatibility. Local persistence with Expo SQLite. Steps system with hierarchical data structure. JSON import/export via device file system.',challenges:'Synchronizing UI state with local database changes presented consistency challenges, especially in inline edit mode.',outcome:'Functional app with over 15 features implemented. User flow validated with real user testing. Import/export working correctly on both platforms.',lessons:'Data model design is crucial before writing UI code. Real user testing early on prevents costly redesigns.',screenshotCount:4}},
        {id:'ai-social-skills',title:'AI for Social Skills - Thesis Proposal',type:'Thesis Project',year:'2025',icon:'psychology',images:['images/tesis/maqueta.png','images/tesis/arquitectura.JPG'],portrait:true,desc:'AI system using computer vision for facial expression recognition and NLP for communication. Focused on children with ASD.',tags:['Computer Vision','NLP','Python'],stack:['Python','TensorFlow','OpenCV','NLTK','Flask'],cols:4,detail:{summary:'Thesis proposal designing an AI system to assist social skills development in children with ASD, combining facial expression recognition and natural language processing.',problem:'Children with ASD frequently struggle to recognize emotional expressions and maintain socially appropriate conversations. Conventional therapies have limited reach and high access cost.',objective:'Design an AI system to serve as a therapeutic support tool, providing real-time feedback on emotional recognition and communication for children with ASD.',role:'Developed the project as a two-person team. Together with my partner, we wrote the research proposal, designed the system architecture, reviewed 47 related literature articles and developed the methodological implementation plan.',technical:'Vision module with OpenCV and TensorFlow for real-time facial expression detection and classification. NLP module with NLTK for communication pattern analysis. Flask web interface.',challenges:'Obtaining ethical and representative training data for ASD populations. Clinical impact evaluation requires coordination with specialized institutions and ethics committee approval.',outcome:'Proposal approved. Systematic review completed with 47 articles analyzed. Conceptual prototype documented and technical architecture validated by academic advisors.',lessons:'Interdisciplinary research requires close collaboration with clinical experts. Ethical considerations in AI for vulnerable populations must be central from design.',screenshotCount:2}}

      additional:[
        {id:'autism-lit-review',title:'Systematic Literature Review on Technology-Assisted Autism Therapies',type:'Academic Research',year:'2025',icon:'menu_book',thumbnail:'images/autism lit review/preview.JPG',thumbPosition:'top',images:[],desc:'Comparative research study analyzing technology-assisted interventions versus traditional therapeutic approaches for improving social and emotional skills in individuals with autism spectrum disorder.',tags:['Research','Comparative Analysis','ASD'],stack:['Academic Research','Literature Review','Comparative Analysis','Data Synthesis','Autism Technology Research'],cols:6,detail:{summary:'Comparative research study analyzing technology-assisted interventions versus traditional therapeutic approaches for improving social and emotional skills in individuals with autism spectrum disorder.',problem:'Technology-assisted therapies for autism have grown rapidly in recent years, including interventions based on virtual reality, augmented reality, robotics, and AI-assisted systems. However, understanding how these approaches compare against traditional therapeutic methods remains a significant research challenge.',objective:'Conduct a systematic literature review to identify, classify, and compare technology-assisted therapeutic interventions against traditional approaches in autism-related social skill development.',role:'Responsible for research planning, study selection, paper classification, comparative analysis, synthesis of findings, and documentation of limitations, biases, and implementation challenges across the reviewed studies.',technical:'The review analyzed academic studies focused on technology-assisted interventions for autism, including approaches based on augmented reality, virtual reality, robotics, AI-assisted systems, and interactive educational technologies. The analysis compared therapeutic outcomes, implementation challenges, adaptability, accessibility, and limitations reported across the studies.',challenges:'Common limitations identified across the reviewed studies included small participant samples, lack of long-term validation, accessibility challenges, infrastructure limitations, insufficient professional training, and difficulties generalizing results across diverse contexts.',outcome:'The review provided a structured understanding of current trends, limitations, and opportunities in technology-assisted autism therapies, while also supporting the conceptual foundation for future AI-assisted educational systems.',lessons:'The project reinforced the importance of evidence-based analysis when designing human-centered technological interventions, especially in sensitive domains such as autism support and social skill development.',screenshotCount:0,keyFindings:[{stat:'83.5%',label:'Facial recognition accuracy'},{stat:'86%',label:'Social interaction improvement'},{stat:'AR + Robotics',label:'Strongest engagement potential'}],comparisonMatrix:{headerAspect:'Aspect',headerTrad:'Traditional Therapies',headerTech:'Technology-Assisted Therapies',rows:[['Interaction','Therapist-dependent','Greater interactivity and immediate feedback'],['Personalization','Manual adaptation','Potential for dynamic and personalized adaptation'],['Accessibility','Limited by location and availability','Possibility of remote or digital access'],['Engagement','May vary by environment','Greater visual stimulation and interaction'],['Scalability','Difficult to scale','Potential to reach more users'],['Validation','More consolidated methods','Still requires more long-term studies'],['Infrastructure','Lower technological dependency','Requires connectivity and technological resources'],['Training','Based on clinical experience','Requires additional technical training']]}}},
        {id:'windows-macro',title:'Desktop Macro Recorder',type:'Desktop Tool',year:'2025',icon:'terminal',desc:'Desktop tool for recording and replaying keyboard and mouse macros, with a modern GUI. Automates repetitive tasks across any application without external software.',tags:['Python','pynput','tkinter'],stack:['Python','pynput','tkinter','JSON'],cols:3,images:['images/windows macro/macro.JPG'],detail:{summary:'Desktop tool for recording and replaying keyboard and mouse macros, with a modern graphical interface. Lets users automate repetitive tasks in any application without relying on external software.',problem:'Many productivity tasks involve repeating the same sequence of clicks and keystrokes dozens of times. Existing solutions are heavy, paid or require complex setup.',objective:'Build a lightweight, portable, ready-to-use tool that records real interactions and replays them accurately, including timing between actions.',role:'Designed and implemented the full project: recording and playback logic, thread management to keep the interface responsive, and the GUI with a dark theme.',technical:'pynput captures global keyboard and mouse events in real time. Events are serialized to JSON with relative timestamps for proportional playback. A sanitizer normalizes control keys (Ctrl+C, Ctrl+V, etc.) that pynput represents as escape characters. The GUI is built with tkinter and runs the logic in separate threads to keep the interface responsive during recording.',challenges:'The main challenge was handling special keys: combinations like Ctrl+W are recorded as escape characters and needed normalization before playback. It was also necessary to isolate input logic from the main thread to prevent the GUI from freezing during recording.',outcome:'Functional tool used daily to automate repetitive workflows. Portable, no installers required, runs directly with Python.',lessons:'Global input listeners require careful isolation in separate threads. Synchronization between the GUI and background processes is as important as the core logic. Well-executed technical simplicity solves real problems without over-engineering.',screenshotCount:1}},
        {id:'excel-recruitment',title:'Excel Training Sessions - HR Professionals',type:'Training',year:'2025',icon:'table_chart',desc:'Excel training program for HR teams, focused on building reports with key indicators that give management real visibility to make informed decisions.',tags:['Excel','Power Query','HR'],stack:['Microsoft Excel','Power Query','VBA','Power BI'],cols:3,images:['images/clases excel/dashboard.svg'],detail:{summary:'Designed and delivered an Excel training program focused on enabling HR teams to transform operational data into reports with key management indicators (turnover, absenteeism, performance), giving leadership real visibility over the area and a concrete basis for strategic decisions.',problem:'HR leadership received basic reports that did not cover the area\'s key indicators or support decision-making. Teams had the data, but lacked the tools to turn it into actionable information.',objective:'Equip HR teams to build reports covering key management indicators that generate clear insights and support leadership\'s strategic decisions.',role:'Designed the curriculum, created materials and practical exercises using real cases, delivered the sessions and tracked adoption of what was learned.',technical:'4-session program: (1) Advanced lookup functions (VLOOKUP, INDEX-MATCH, XLOOKUP); (2) Pivot tables; (3) Power Query for data transformation; (4) Basic VBA macros.',challenges:'Different prior skill levels required adapting the pace. Keeping interest in technical sessions required using real daily work cases as examples.',outcome:'Teams built periodic reports with key indicators that had not existed before, giving leadership real visibility over the area. Reporting shifted from raw data lists to concrete decision-support material, and report preparation time dropped significantly.',lessons:'Training is more effective with real participant data. Post-training follow-up is key for adoption. Providing reference resources beats step-by-step tutorials.',screenshotCount:2}}

function handleCopy(text, btn) {
  var icon = btn.querySelector('.material-symbols-outlined');
  function done() {
    if (icon) { icon.textContent = 'check'; }
    btn.style.color = '#059669'; btn.style.borderColor = '#059669';
    setTimeout(function() {
      if (icon) { icon.textContent = 'content_copy'; }
      btn.style.color = ''; btn.style.borderColor = '';
    }, 1500);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta); done();
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); done();
  }
}


function initFade() {
  setTimeout(function(){
    var obs = new IntersectionObserver(function(entries){
      entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); obs.unobserve(e.target); } });
    },{threshold:0.07});
    document.querySelectorAll('.fade:not(.in)').forEach(function(el){ obs.observe(el); });
  },50);
}

      if (all[i].id === state.id) {
        ge('home-page').style.display = 'none';
        ge('all-projects-page').style.display = 'none';
        ge('project-detail-page').style.display = 'block';
        _activeProjectId = state.id;
        tx('detail-back-label', data.projectDetail.back);
        renderProjectDetail(all[i]);
        window.scrollTo(0,0);
        initFade();
        break;
      }
    }
  } else if (state.page === 'projects') {
    ge('home-page').style.display = 'none';
    ge('project-detail-page').style.display = 'none';
    ge('all-projects-page').style.display = 'block';
    _activeProjectId = null;
    window.scrollTo(0,0);
    initFade();
  } else {
    ge('all-projects-page').style.display = 'none';
    ge('project-detail-page').style.display = 'none';
    ge('home-page').style.display = 'block';
    _activeProjectId = null;
    window.scrollTo(0,0);
  }
});

render();
history.replaceState({page:'home'}, '');
</script>
