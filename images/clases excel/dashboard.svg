  <text x="810" y="214" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">2.000</text>

  <!--
    Sección 3 — Participantes (escala 0-3000)
      Externa   380 → 380/3000*380 =  48.1px → label en x=483
      Interna 2,870 → 2870/3000*380 = 363.5px → label en x=798
  -->
  <text x="612" y="240" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#444" text-anchor="middle">Participantes</text>

  <text x="364" y="260" font-family="Arial,sans-serif" font-size="9" fill="#555">Externa</text>
