<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 510" width="880" height="510">
  <rect width="880" height="510" fill="#ececec"/>

  <!-- ===== LEFT PANEL ===== -->

  <!-- Title box -->
  <rect x="8" y="8" width="335" height="80" fill="#1B5E20"/>
  <text x="175" y="40" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">DASHBOARD</text>
  <text x="175" y="64" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">CAPACITACIÓN — 2025</text>

  <!-- KPI card 1 -->
  <rect x="8" y="96" width="104" height="62" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="60" y="113" font-family="Arial,sans-serif" font-size="7.5" fill="#555" text-anchor="middle">N° de Programas</text>
  <text x="60" y="147" font-family="Arial,sans-serif" font-size="30" font-weight="700" fill="#1B5E20" text-anchor="middle">18</text>

  <!-- KPI card 2 -->
  <rect x="118" y="96" width="117" height="62" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="177" y="113" font-family="Arial,sans-serif" font-size="7.5" fill="#555" text-anchor="middle">Horas de Aprendizaje</text>
  <text x="177" y="147" font-family="Arial,sans-serif" font-size="30" font-weight="700" fill="#1B5E20" text-anchor="middle">2,847</text>

  <!-- KPI card 3 -->
  <rect x="241" y="96" width="102" height="62" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="292" y="113" font-family="Arial,sans-serif" font-size="7.5" fill="#555" text-anchor="middle">Participantes</text>
  <text x="292" y="147" font-family="Arial,sans-serif" font-size="30" font-weight="700" fill="#1B5E20" text-anchor="middle">3,250</text>

  <!-- Donut section box -->
  <rect x="8" y="166" width="335" height="170" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="175" y="184" font-family="Arial,sans-serif" font-size="9" fill="#333" text-anchor="middle">Cursos obligatorios: % de cumplimiento</text>

  <!--
    Donuts: r=35, circunferencia=219.91
    Para empezar en 12 en punto: stroke-dashoffset = +54.98 (positivo = gira CCW desde las 3h)
    SIGMA   97% → dasharray = 219.91*0.97 = 213.3
    ONBOARD 88% → dasharray = 219.91*0.88 = 193.5
    PDP     95% → dasharray = 219.91*0.95 = 208.9
  -->

  <!-- Donut 1: SIGMA 97% — cx=75 cy=250 -->
  <circle cx="75" cy="250" r="35" fill="none" stroke="#C8E6C9" stroke-width="13"/>
  <circle cx="75" cy="250" r="35" fill="none" stroke="#2E7D32" stroke-width="13"
          stroke-dasharray="213.3 219.9" stroke-dashoffset="55"/>
  <text x="75" y="246" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#1a1a1a" text-anchor="middle">97%</text>
  <text x="75" y="259" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">cumplido</text>
  <text x="75" y="310" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#222" text-anchor="middle">SIGMA</text>

  <!-- Donut 2: ONBOARDING 88% — cx=175 cy=250 -->
  <circle cx="175" cy="250" r="35" fill="none" stroke="#C8E6C9" stroke-width="13"/>
  <circle cx="175" cy="250" r="35" fill="none" stroke="#2E7D32" stroke-width="13"
          stroke-dasharray="193.5 219.9" stroke-dashoffset="55"/>
  <text x="175" y="246" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#1a1a1a" text-anchor="middle">88%</text>
  <text x="175" y="259" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">cumplido</text>
  <text x="175" y="310" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#222" text-anchor="middle">ONBOARDING</text>

  <!-- Donut 3: PDP 95% — cx=275 cy=250 -->
  <circle cx="275" cy="250" r="35" fill="none" stroke="#C8E6C9" stroke-width="13"/>
  <circle cx="275" cy="250" r="35" fill="none" stroke="#2E7D32" stroke-width="13"
          stroke-dasharray="208.9 219.9" stroke-dashoffset="55"/>
  <text x="275" y="246" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#1a1a1a" text-anchor="middle">95%</text>
  <text x="275" y="259" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">cumplido</text>
  <text x="275" y="310" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#222" text-anchor="middle">PDP</text>

  <!-- Legend -->
  <rect x="20" y="320" width="9" height="9" fill="#2E7D32"/>
  <text x="33" y="328" font-family="Arial,sans-serif" font-size="8" fill="#555">finalizado</text>
  <rect x="102" y="320" width="9" height="9" fill="#C8E6C9" stroke="#aaa" stroke-width="0.5"/>
  <text x="115" y="328" font-family="Arial,sans-serif" font-size="8" fill="#555">no finalizado</text>

  <!-- ===== RIGHT PANEL ===== -->
  <rect x="351" y="8" width="521" height="318" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="612" y="30" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#222" text-anchor="middle">Externa / Interna</text>

