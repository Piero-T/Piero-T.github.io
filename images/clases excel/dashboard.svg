  <line x1="263" y1="334" x2="263" y2="502" stroke="#bbb" stroke-width="1"/>
  <line x1="388" y1="334" x2="388" y2="502" stroke="#bbb" stroke-width="1"/>
  <line x1="513" y1="334" x2="513" y2="502" stroke="#bbb" stroke-width="1"/>
  <line x1="638" y1="334" x2="638" y2="502" stroke="#bbb" stroke-width="1"/>
  <line x1="751" y1="334" x2="751" y2="502" stroke="#bbb" stroke-width="1"/>

  <!-- Row 1: N° de programas (light green) -->
  <rect x="8" y="366" width="864" height="44" fill="#C8E6C9"/>
  <text x="20" y="384" font-family="Arial,sans-serif" font-size="9" fill="#333">N° de</text>
  <text x="20" y="396" font-family="Arial,sans-serif" font-size="9" fill="#333">programas</text>
  <text x="200" y="392" font-family="Arial,sans-serif" font-size="13" fill="#222" text-anchor="middle">3</text>
  <text x="325" y="392" font-family="Arial,sans-serif" font-size="13" fill="#222" text-anchor="middle">4</text>
  <text x="450" y="392" font-family="Arial,sans-serif" font-size="13" fill="#222" text-anchor="middle">4</text>
  <text x="575" y="392" font-family="Arial,sans-serif" font-size="13" fill="#222" text-anchor="middle">2</text>
  <text x="694" y="392" font-family="Arial,sans-serif" font-size="13" fill="#222" text-anchor="middle">3</text>
  <text x="812" y="392" font-family="Arial,sans-serif" font-size="13" fill="#222" text-anchor="middle">2</text>
  <line x1="8" y1="410" x2="872" y2="410" stroke="#bbb" stroke-width="1"/>

  <!-- Row 2: Participantes (white) -->
  <text x="20" y="430" font-family="Arial,sans-serif" font-size="9" fill="#333">Participantes</text>
  <text x="200" y="438" font-family="Arial,sans-serif" font-size="13" fill="#222" text-anchor="middle">210</text>
  <text x="325" y="438" font-family="Arial,sans-serif" font-size="13" fill="#222" text-anchor="middle">480</text>
  <text x="450" y="438" font-family="Arial,sans-serif" font-size="13" fill="#222" text-anchor="middle">820</text>
  <text x="575" y="438" font-family="Arial,sans-serif" font-size="13" fill="#222" text-anchor="middle">630</text>
  <text x="694" y="438" font-family="Arial,sans-serif" font-size="13" fill="#222" text-anchor="middle">720</text>
  <text x="812" y="438" font-family="Arial,sans-serif" font-size="13" fill="#222" text-anchor="middle">390</text>
  <line x1="8" y1="456" x2="872" y2="456" stroke="#bbb" stroke-width="1"/>

