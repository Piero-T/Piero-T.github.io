    Etiquetas de valor: siempre fuera de la barra, a la derecha, fill="#333"

    Sección 1 — N° de Programas (escala 0-15)
      Externa  8 → 8/15*380 = 202.7px  → label en x=637
      Interna 10 → 10/15*380 = 253.3px → label en x=688
  -->
  <text x="612" y="53" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#444" text-anchor="middle">N° de Programas</text>

  <text x="364" y="73" font-family="Arial,sans-serif" font-size="9" fill="#555">Externa</text>
  <rect x="430" y="61" width="380" height="14" fill="#f0f0f0"/>
  <rect x="430" y="61" width="203" height="14" fill="#2E7D32"/>
