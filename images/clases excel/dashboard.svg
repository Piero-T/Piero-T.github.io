  <rect x="430" y="268" width="380" height="14" fill="#f0f0f0"/>
  <rect x="430" y="268" width="364" height="14" fill="#2E7D32"/>
  <text x="798" y="280" font-family="Arial,sans-serif" font-size="9" fill="#333">  2,870</text>

  <text x="430" y="310" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">0</text>
  <text x="557" y="310" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">1.000</text>
  <text x="683" y="310" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">2.000</text>
  <text x="810" y="310" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">3.000</text>

  <!-- ===== BOTTOM TABLE ===== -->
  <rect x="8" y="334" width="864" height="168" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <rect x="8" y="334" width="864" height="32" fill="#2E7D32"/>

