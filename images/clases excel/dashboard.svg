  <text x="430" y="112" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">0</text>
  <text x="557" y="112" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">5</text>
  <text x="683" y="112" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">10</text>
  <text x="810" y="112" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">15</text>

  <!--
    Sección 2 — Horas (escala 0-2000)
      Externa 1,240 → 1240/2000*380 = 235.6px → label en x=670
      Interna 1,607 → 1607/2000*380 = 305.3px → label en x=740
  -->
  <text x="612" y="138" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#444" text-anchor="middle">Horas</text>

