  <text x="73"  y="355" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Mes</text>
  <text x="200" y="355" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ENERO</text>
  <text x="325" y="355" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">FEBRERO</text>
  <text x="450" y="355" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">MARZO</text>
  <text x="575" y="355" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ABRIL</text>
  <text x="694" y="355" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">MAYO</text>
